name: Deploy assets to Azure Static Web Apps

# Assets ship on game-patch cadence, not code cadence. Pushes to main (a patch's
# new/changed webp delta) deploy; manual runs are available via workflow_dispatch.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build_and_deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false
          submodules: false
      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          # Pre-converted .webp files are committed as-is — no build step.
          app_location: "/"
          skip_app_build: true
          skip_api_build: true
          config_file_location: "/"
